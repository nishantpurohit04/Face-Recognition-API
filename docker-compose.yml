version: "3.9"

services:
  face-api:
    build: .
    container_name: face-recognition-api
    ports:
      - "8000:8000"
    volumes:
      # Gallery persists across container restarts
      - ./known_faces:/app/known_faces
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # allow time for model warm-up
